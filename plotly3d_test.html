<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plotly 3D テスト</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  >

  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
  <main class="container">
    <h1>Plotly 3D テスト</h1>
    <p>
      pd, ml, adab の3次元ベクトルを、球面上の軌跡として描画します。
    </p>

    <p>
      <a href="./index.html">トップページに戻る</a>
    </p>

    <article>
  <h2>球面上の軌跡</h2>
  <p id="status">読み込み中です。</p>

  <div style="position: relative;">
    <div id="hoverPanel" style="
      display: none;
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      padding: 0.8rem 1rem;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      box-shadow: 0 0.3rem 1rem rgba(0, 0, 0, 0.25);
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 320px;
    "></div>

    <div id="plot3d" style="width: 100%; height: 650px;"></div>
  </div>
</article>

  <script src="./plotly3d_test.js"></script>
</body>
</html>
