<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>テストページ</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  >
</head>
<body>
  <main class="container">
    <h1>これはテストです</h1>
    <p>GitHub Pages の動作確認用ページです。</p>

    <article>
      <h2>あいさつテスト</h2>
      <p id="message">ボタンを押してください。</p>
      <button id="greetingButton">テストボタン</button>
    </article>

    <article>
      <h2>Plotlyテスト</h2>
      <p>Duration(min) と pd_x のグラフを表示するページへ移動します。</p>

      <a href="./plotly_test.html" role="button">
        Plotlyテストページを開く
      </a>
    </article>

    <article>
      <h2>Plotly3Dテスト</h2>
      <p>球面上のONBの軌跡を表示するページへ移動します。</p>

      <a href="./plotly3d_test.html" role="button">
        Plotly3Dテストページを開く
      </a>
    </article>
  </main>

  <script>
    const messages = ["おはよう", "こんにちは", "さようなら"];
    let index = 0;

    const messageElement = document.getElementById("message");
    const button = document.getElementById("greetingButton");

    button.addEventListener("click", () => {
      messageElement.textContent = messages[index];
      index = (index + 1) % messages.length;
    });
  </script>
</body>
</html>
